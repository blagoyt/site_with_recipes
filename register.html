<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Cooking Recipes Site</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="d-flex align-items-center justify-content-center min-vh-100">
        <div class="card p-4 shadow" style="max-width: 420px; width: 100%;">
            <h2 class="mb-3 text-center">Create an Account</h2>
            <p class="text-center text-muted">Register once and come back anytime.</p>
            <form id="registerForm">
                <div class="mb-3">
                    <label for="regUsername" class="form-label">Username</label>
                    <input type="text" class="form-control" id="regUsername" required>
                </div>
                <div class="mb-3">
                    <label for="regEmail" class="form-label">Email</label>
                    <input type="email" class="form-control" id="regEmail" required>
                </div>
                <div class="mb-4">
                    <label for="regPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="regPassword" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
            <div class="mt-3 text-center">
                <a href="login.html">Already have an account? Login</a>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        // Redirect to the main site if already authenticated
        if (isAuthenticated()) {
            window.location.href = 'index.html';
        }

        document.getElementById('registerForm').addEventListener('submit', (event) => {
            event.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            if (!username) return;
            setUser(username);
            window.location.href = 'index.html';
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
