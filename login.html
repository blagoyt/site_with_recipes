<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cooking Recipes Site</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="d-flex align-items-center justify-content-center min-vh-100">
        <div class="card p-4 shadow" style="max-width: 420px; width: 100%;">
            <h2 class="mb-3 text-center">Welcome Back</h2>
            <p class="text-center text-muted">Login to continue, or continue as a guest.</p>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <div class="d-flex justify-content-between mt-3">
                <a href="register.html">Create an account</a>
                <button id="guestBtn" class="btn btn-outline-secondary btn-sm">Continue as Guest</button>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        // Redirect to the main site if already authenticated
        if (isAuthenticated()) {
            window.location.href = 'index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', (event) => {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            if (!username) return;
            setUser(username);
            window.location.href = 'index.html';
        });

        document.getElementById('guestBtn').addEventListener('click', () => {
            setUser('Guest');
            window.location.href = 'index.html';
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
